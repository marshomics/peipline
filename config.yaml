# ============================================================================
# C71 (pseudomurein endo-isopeptidase Pei) screening pipeline - configuration
# ============================================================================

# ---- Software --------------------------------------------------------------
# null  -> Snakemake solves envs/*.yaml itself. Needs internet on the node that
#          runs each job. Use this on a laptop only.
# path  -> pre-built environments already exist under this directory, one per
#          env name (hmmer, py, phylo, network, prodigal, r). Nothing is
#          downloaded and no channel is contacted. Required on an offline
#          cluster. Build them with setup/build_envs.sh on a machine with
#          internet, then setup/install_envs.sh here.
#
# It must be on a filesystem the compute nodes can read.
envs_root: null
# envs_root: /ebio/abt3_projects/software/c71_envs

# ---- Inputs ----------------------------------------------------------------
inputs:
  # Pre-existing proteomes (bacteria).
  sample_table: /ebio/abt3_scratch/jmarsh/jan/faa_sample_table_90percent.tsv
  sample_col: sample
  faa_col: faa
  # Optional: a column in the sample table giving each bacterial genome's GFF3
  # path, whose feature IDs match the .faa protein ids. Only used for the
  # pseudomurein synteny check, and only read for out-of-order candidates, so a
  # missing column or value is harmless. (Archaeal coordinates come straight from
  # the Prodigal .faa headers, which cannot mismatch the protein id -- the
  # Prodigal GFF is emitted too but its ids differ from the .faa, so it is not the
  # join source.) null -> no bacterial synteny.
  gff_col: gff

  # Genome-quality metadata for the above. Column names are auto-detected from
  # the candidate lists under `qc:` below.
  #
  # NOTE: this table also carries `gtdb_domain`. 3,215 of the 342,759 "bacterial"
  # proteomes are in fact d__Archaea, and Methanobacteriota is where Pei lives.
  # Domain is read from that column, never from which file a genome arrived in.
  bacteria_metadata: /ebio/abt3_projects2/Gut_genetics2/data/total_metadata_qc_bbmap_animals_extra.txt
  bacteria_metadata_key: genome    # null -> auto-detect the column holding sample IDs

  # Archaeal assemblies to call genes on with Prodigal.
  archaea_fna_glob: /ebio/abt3_scratch/jmarsh/archaea_plasmids/db/final_db/gtdb_archaea/seqs/*.fna
  archaea_metadata: /ebio/abt3_scratch/jmarsh/gtdb/ar53_metadata_r232.tsv
  archaea_metadata_key: accession

# GTDB reference trees for the phylogenetic regressions.
# The archaeal tree and metadata are BOTH GTDB r232 and co-located, so their tip
# labels come from the same release. The old ar53.tree matched only ~45% of
# archaeal genomes -- below min_match_fraction -- which is why this was changed.
trees:
  bacteria: /ebio/abt3_scratch/jmarsh/tract_score3/gtdb_custom_trees/human_animal_free_90percent/output/gtdbtk.rooted.speciesnames.tree
  archaea:  /ebio/abt3_scratch/jmarsh/gtdb/ar53_r232.tree

# How genomes map to tree tip labels.
#
#   identity          the sample ID is the tip label
#   gtdb_accession    tries GB_/RS_/bare variants of the sample ID
#   gtdb_species      the genome's gtdb_species is the tip label
#   gtdb_species_rep  accession first, then the genome's species representative
#
# BOTH supplied trees are species-level, so both use a species mode:
#   gtdbtk.rooted.speciesnames.tree has 9,784 tips labelled `s__Genus species`.
#     Matching genome IDs against them matches zero of 342,759.
#   ar53_r232.tree carries species representatives only, so a non-representative
#     genome inherits its representative's tip via `gtdb_representative`.
#
# Many genomes therefore share a tip. phyloglm.R aggregates to the tip.
tip_matching:
  bacteria: gtdb_species
  archaea: gtdb_species_rep
  min_match_fraction: 0.50         # abort below this; a bad key is not a result

# Which metadata columns carry genome quality. First match wins.
#
# `ctg_L50` in total_metadata_qc_bbmap_animals_extra.txt is misnamed: its median
# is 39,413 against a 2.1 Mb median genome and 89 contigs, so it is an N50
# *length*, not an L50 *count*. It is used as N50 deliberately, not by accident.
qc:
  completeness:  [checkm2_completeness, checkm_completeness, completeness, Completeness, comp]
  contamination: [checkm2_contamination, checkm_contamination, contamination, Contamination, contam]
  n50:           [n50_contigs, contig_n50, scaffold_n50, ctg_L50, N50, n50]
  contigs:       [contig_count, n_contigs, num_contigs, contigs, scaffold_count]

# ---- Prodigal --------------------------------------------------------------
prodigal:
  mode: single                     # 'single' per-genome model; falls back to 'meta'
                                   # automatically on short/fragmented assemblies
  translation_table: 11
  min_len_for_single: 20000        # prodigal's own floor for training
  batch_size: 100                  # genomes per job (~10 s each -> ~15 min/job)

# ---- Profiles --------------------------------------------------------------
# PF12386 is the specific model: the C-terminal catalytic cysteine-protease
# domain of pseudomurein endo-isopeptidase Pei. It has a curated Pfam gathering
# threshold, so use it.
#
# SSF54001 is the SCOP 'cysteine proteinases' superfamily. It is a sensitivity
# net, not evidence of C71 identity: at score 25 it hits every papain-like and
# transglutaminase-like protein in the database. The two are kept as separate
# evidence tiers throughout.
profiles:
  PF12386:
    path: /ebio/abt3_scratch/jmarsh/jan/hmms/PF12386.hmm
    threshold: cut_ga              # 'cut_ga' | 'cut_nc' | 'cut_tc' | a number
    role: specific
    family: c71
  SSF54001:
    path: /ebio/abt3_scratch/jmarsh/jan/hmms/SSF54001.hmm
    threshold: 25
    role: sensitivity
    family: null                   # a fold model; it belongs to no single family
  # ---- the C39 arm ---------------------------------------------------------
  # PeiR (UniProt D3DZZ6), the only Pei that lyses the Thr-walled M. ruminantium
  # M1, carries PF03412 and NOTHING else: no PF12386, no PF09373. The three
  # CRISPRTarget-discovered active Peis (PeiG2, PeiTh2, PeiF3) were chosen for
  # homology to PeiR, and PeiF3's lytic activity was killed by mutating its
  # "C39 peptidase domain" active site. So the divergent Pei clade is a C39 clade.
  #
  # READ THIS BEFORE RUNNING. MEROPS C39 proper is the bacteriocin-processing
  # peptidase domain in the N-terminus of ABC transporters, which cleaves the
  # double-glycine leader of class II bacteriocins. It is papain-like with a CHD
  # triad, which is why Pei falls into it, but across 350,000 proteomes the
  # overwhelming majority of PF03412 hits will be bacteriocin exporters. The
  # active-site filter is the ONLY thing separating this arm from a pile of
  # transporters, so `decoy_fdr` and the triad pass rate are reported per family,
  # never pooled.
  #
  # ENABLED. The per-family execution path now exists, so the old reason to keep
  # this off is gone. When on, PF03412 is searched, but its hits are NOT pooled
  # with the C71 hits: `extract_seqs.py --family c39` routes them to their own
  # arm, `hmmalign_c39` aligns them to the PF03412 scaffold (never PF12386), and
  # `triad_c39` learns the Cys->His/His->Asp spacing from the hits themselves
  # rather than borrowing C71's gap of 35 (which would reject PeiR, whose gap is
  # 72). The C39 arm produces its own c39.faa, its own triad candidates, and its
  # own decoy FDR, reported separately. `pei_check` now certifies PeiR as findable.
  #
  # The standing caution still holds and is stated in the report: MEROPS C39 proper
  # is the bacteriocin-processing peptidase of ABC exporters, so most PF03412 hits
  # across 350k proteomes are transporters, not Pei. The learned triad + per-family
  # FDR are the only things separating signal from that pile; read them, and confirm
  # any candidate at the bench. To turn the arm off, set enabled: false (the DAG
  # reverts to the single C71 arm and pei_check reports PeiR as unfindable again).
  PF03412:
    enabled: true
    path: /ebio/abt3_scratch/jmarsh/jan/hmms/PF03412.hmm
    threshold: cut_ga
    role: specific
    family: c39

# ---- Per-family rules ------------------------------------------------------
# A family owns its alignment scaffold, its structure anchor and its triad
# spacing prior. Nothing crosses between them without an explicit, tested map.
#
# THE REASON. In C71 the catalytic Cys->His gap is 35 (PeiW C198/H233, PeiP
# C213/H248). PeiR's catalytic cysteine is C90, fixed by the C90A mutant (PDB
# 8Z4N). Residue 125 -- C90+35 -- is a proline. The nearest downstream histidine
# is H162, a gap of 72. Applying the C71 prior to a C39 sequence discards PeiR.
# `pei_check.py` refuses to start a run in which that would happen.
families:
  c71:
    align_profile: PF12386         # scaffold: the specific model, not the fold model
    specific_profile: PF12386      # triad columns learned from these hits only
    sensitivity_profiles: [SSF54001]
    structure: /ebio/abt3_scratch/jmarsh/jan/structures/8jx4.cif
    structure_numbering: PeiW
    expected_gap_1_2: 35
    expected_gap_2_3: 24           # PeiP's; PeiW's is 17. Tolerance must cover both.
    gap_tolerance: 8
    pei_class_applies: true        # Wang et al.'s V252/C265 partition is C71 numbering
    seeds: [PeiW, PeiP]
  c39:
    align_profile: PF03412
    specific_profile: PF03412
    sensitivity_profiles: [SSF54001]
    structure: /ebio/abt3_scratch/jmarsh/jan/structures/8z4h.cif   # PeiR, 2.0 A
    structure_numbering: PeiR
    structure_expect: {90: C}      # the C90A mutant is what makes this catalytic
    # DELIBERATELY NULL. One sequence is not a prior. The C39 spacing is learned
    # from the PF03412 hits themselves, anchored on C90 in 8Z4H, and the learned
    # value is written to the report so it can be argued with.
    expected_gap_1_2: null
    expected_gap_2_3: null
    gap_tolerance: null
    pei_class_applies: false
    seeds: [PeiR]
    seeds_unresolved: [PeiG2, PeiTh2, PeiF3]   # accessions not published

# Kept for backwards compatibility with the single-family scripts. Anything that
# reads these two keys is operating on the C71 arm only, and should say so.
align_profile: PF12386
specific_profile: PF12386

# Reject fragmentary hits: best domain must cover this fraction of the profile.
min_profile_coverage: 0.0          # 0 = off. 0.5 is a defensible starting point.

# Empirical false-discovery estimate: search reversed decoy sequences and report
# a score-vs-FDR curve. Costs one extra pass over the data.
decoy_fdr: true

# ---- Outputs ---------------------------------------------------------------
outputs:
  hmm_output_dir: /ebio/abt3_scratch/jmarsh/jan/hmm_output
  combined_table: /ebio/abt3_scratch/jmarsh/jan/hmm_output_combine.txt
  merged_table:   /ebio/abt3_scratch/jmarsh/jan/faa_sample_table_90percent_taxonomy.tsv
  outdir:         /ebio/abt3_scratch/jmarsh/jan/outputs
  workdir:        /ebio/abt3_scratch/jmarsh/jan/work
  prodigal_dir:   /ebio/abt3_scratch/jmarsh/jan/prodigal

# Genomes per search_batch job. 342,759 bacteria + ~22k archaea at 1,000 each
# is ~365 jobs, each reading ~1 GB of proteomes and running 4 hmmsearch passes
# (2 profiles x target+decoy) against node-local scratch.
#
# Raise it to cut job count and shared-filesystem metadata pressure; lower it if
# $TMPDIR on the exec hosts is small (the batch FASTA plus its decoy is ~2x the
# proteome bytes in the batch). 1,000 x ~1 MB x 2 = ~2 GB of scratch per job.
batch_size: 1000
hmmsearch_cpu: 8                   # slots per search_batch job; 865 free on standard.q
allow_missing_faa: true

# ---- Alignment -------------------------------------------------------------
hmmalign_trim: true

# ---- Sequence redundancy weighting ----------------------------------------
# Every sequence-level frequency in this pipeline (triad column conservation,
# logos, entropy, consensus, mutual information, subgroup sizes) is weighted by
# 1 / (size of the sequence's identity cluster). Without this, a genus with
# 8,000 sequenced isolates dictates what the family's active site "looks like".
redundancy:
  cluster_min_seq_id: 0.90
  cluster_coverage: 0.80
  enabled: true

# ---- Catalytic triad -------------------------------------------------------
# PeiW (8JX4) and PeiP (8Z4F) both use a Cys-His-Asp triad (Wang et al. 2025),
# so CHD is the hypothesis, not CHN. Wang et al. call the fold papain-like
# rather than transglutaminase-like; either way the triad is CHD and the
# C198A/H233A/D250A mutants are inactive. The detector still scores alternatives and
# writes them to triad_candidates.tsv, because a heuristic that cannot be
# audited is not a result.
triad:
  first_residue: C
  second_residue: H
  third_residue: D
  alt_third_residue: N             # scored for comparison only; null to skip

  # Your C213/H248/D272 are exactly PeiP's catalytic triad (Wang et al. 2025).
  # PeiW's is C198/H233/D250. So the Cys->His gap is 35 in both, but the His->Asp
  # gap is 24 in PeiP and 17 in PeiW. The prior below is PeiP's; the tolerance
  # has to cover PeiW, which it does.
  expected_gap_1_2: 35
  expected_gap_2_3: 24
  spacing_tolerance: 25
  spacing_weight: 0.35

  min_occupancy: 0.50
  min_residue_freq: 0.40
  max_candidates_per_residue: 40

  # Columns are learned from `specific_profile` hits only, then applied
  # unchanged to the SSF54001-only sequences in the same alignment.
  restrict_to_specific: true

  # A sequence occupying fewer than this fraction of PF12386's match states was
  # not placed by hmmalign in any meaningful sense. It is reported as
  # `low_coverage`, NOT as triad-negative.
  #
  # This matters for the SSF54001 tier, and it matters a lot. SCOP 54001 spans
  # ~22 families related to the papain catalytic core by insertion and by CIRCULAR
  # PERMUTATION, transglutaminase cores among them. A permuted core carries a
  # Cys-His-Asp triad in 3D but in a different sequential order, and the filter
  # demands i < j < k in PF12386 coordinates. Such a protein cannot pass, and its
  # failure must NOT be counted as evidence that transglutaminase-like proteins
  # lack the Pei active site.
  #
  # `triad_filter_by_tier.tsv` therefore reports frac_triad_positive_of_testable.
  # The denominator is the sequences the test could actually run on. If
  # frac_testable is low for ssf_only, the PF12386 scaffold cannot address the
  # transglutaminase question at all, and answering it needs a profile-profile map
  # (HH-suite) or a structural superposition.
  min_match_coverage: 0.5

  override_columns: null           # e.g. [112, 147, 171] after you audit

# ---- Phylogeny -------------------------------------------------------------
tree:
  dereplicate: true
  max_seqs: 5000
  cluster_min_seq_id: 0.90
  cluster_coverage: 0.80
  trimal_mode: "-gappyout"
  mode: full                       # 'full' = MFP + UFBoot + SH-aLRT; 'fast'
  iqtree_threads: 16
  seed: 12345

# ---- Active-site subgroups -------------------------------------------------
active_site:
  flank_window: 5
  max_cluster_seqs: 20000
  entropy_weighting: true
  pca_selection: parallel_analysis  # parallel_analysis | variance | fixed
  pca_variance: 0.90
  pca_components: 50
  k_criterion: silhouette_cosine    # see README for why not Euclidean
  k_min: 2
  k_max: 15
  run_hdbscan: true
  hdbscan_min_cluster_size: 25
  random_state: 12345

# ---- Coupling between barcode positions ------------------------------------
coupling:
  n_permutations: 1000
  fdr: 0.05
  min_column_occupancy: 0.5

# ---- Sequence similarity network -------------------------------------------
# EFI-EST convention: edge weight = -log10(E-value) from an all-vs-all search.
ssn:
  evalue_max: 1e-3
  diamond_sensitivity: "--very-sensitive"
  threshold_min: 10
  threshold_max: 200
  threshold_step: 5
  threshold: null                  # null -> pick the knee of components-vs-threshold
  max_nodes: 20000                 # cluster reps above this
  layout: drl                      # python-igraph layout
  threads: 32

# ---- Convergence -----------------------------------------------------------
convergence:
  n_permutations: 1000             # tip-label shuffles for the origins null
  n_brownian: 500                  # simulations for the Fritz & Purvis D statistic
  seed: 12345

# ---- Phylogenetic logistic regression --------------------------------------
phyloglm:
  # phylolm builds the full n x n phylogenetic covariance, so tips must be
  # capped. Above `max_tips` the pipeline draws `n_replicates` outcome-stratified
  # subsamples, fits each, and pools with Rubin's rules.
  max_tips: 8000
  n_replicates: 20
  btol: 20
  covariates: [completeness, contamination, log10_n50, log10_contigs, log10_n_proteins]
  # Reference values for the bias-adjusted prevalence prediction.
  reference: {completeness: 100.0, contamination: 0.0}
  run_subgroup_models: true
  min_positives: 25                # skip a model with fewer positives than this
  seed: 12345

# ============================================================================
# Target-specificity analyses
#
# Pei cleaves the epsilon-isopeptide bond between ALANINE and lysine in the
# pseudomurein cross-link. Kandler & Koenig 1978 (Arch Microbiol 118:141-152)
# give the molar ratio Lys : Ala : Glu as 1 : 1.2 : 2 -- one alanine per subunit
# -- so the alanine they report as completely replaced by threonine in
# Methanobrevibacter ruminantium M1 is *the* P1 alanine. That is the substrate
# axis this section tests.
#
# The same paper reports a second, independent substitution on the other side of
# the scissile bond: about a quarter of the lysine in Methanobrevibacter smithii
# PS is ornithine, whose delta-amine is one methylene shorter than a lysine
# epsilon-amine. That is an S1' question, and the published chromogenic assay
# (H-Glu-gamma-Ala-pNA) has no acceptor residue in it, so it cannot test it.
#
# Genus-level assignment is not merely uncertain, it is wrong: Methanobrevibacter
# contains M. ruminantium (Thr/Lys), M. smithii (Ala/Orn) and M. arboriphilus
# (Ala/Lys). scripts/cellwall_reference.py refuses to guess.
#
# The enzymes are two-module (four N-terminal PMBR repeats, PF09373; C-terminal
# C71 catalytic domain), and the repeat array is the published candidate binding
# determinant. So specificity has two axes -- which bond the groove cuts, and
# which sacculus the repeats bind -- and this section measures both.
# ============================================================================
specificity:
  enabled: true

  # ---- domain architecture -----------------------------------------------
  # Pfam-A.hmm, hmmpress'ed. Used to type every C71-carrying protein.
  pfam_hmm: /ebio/abt3_scratch/jmarsh/jan/pfam/Pfam-A.hmm
  pmbr_accession: PF09373          # pseudomurein-binding repeat
  catalytic_accession: PF12386
  # Binding modules that would imply a *different* cell wall. A C71 catalytic
  # domain fused to one of these, in a bacterium, is either a different
  # substrate or a mis-assembly. Either way it is the interesting case.
  accessory_binding_domains:
    - PF01476   # LysM
    - PF08239   # SH3_3  (SH3b)
    - PF01471   # PG_binding_1
    - PF01473   # CW_binding_1 (choline-binding)
    - PF04122   # CW_2
    - PF06347   # Peptidase_M23 partner? kept for architecture reporting only
  hmmscan_evalue: 1e-5
  min_domain_coverage: 0.5

  # ---- the binding module --------------------------------------------------
  # Visweswaran, Dijkstra & Kok 2011 (PLoS ONE 6:e21582) fused 1, 2 or 3 PMB
  # motifs to GFP:
  #
  #   3 motifs -> binds the pseudomurein sacculus, and bacterial spheroplasts
  #   2 motifs -> binds bacterial spheroplasts ONLY, not pseudomurein
  #   1 motif  -> binds nothing
  #   any      -> no binding to intact bacterial cells
  #
  # So <3 motifs means the protein cannot dock on an intact sacculus, whatever
  # its active site looks like. The count stops being a covariate and becomes a
  # phenotype -- which makes it load-bearing. A PMB motif is 30-35 residues, and
  # a single dropped repeat flips the call. hmmscan therefore runs ONCE at
  # `count_evalue_permissive` and domain_arch.py filters at both thresholds;
  # proteins that change side are classed `pmbr_count_ambiguous` rather than
  # assigned to whichever side the E-value picked.
  #
  # NOTE the abstract of that paper says "at least two of the three motifs are
  # necessary for binding". The Results, the section heading, the title and the
  # conclusion all say three are needed for pseudomurein; two suffice only for
  # the lysozyme-treated bacterial spheroplasts. The code follows the Results.
  #
  # PMBR is NOT a pseudomurein marker. The domain binds NAG, the one sugar shared
  # by murein and pseudomurein, and sticks to L. lactis and E. coli spheroplasts.
  # It is also not Pei-specific: the S-layer protein MTH719 carries three motifs
  # and no catalytic domain. Do not read "has PMBR" as "targets pseudomurein".
  pmbr:
    count_evalue_strict: 1e-5
    count_evalue_permissive: 1e-2
    # Binding is nil at pH 4.0, partial at 6.5, complete at 9.0 (pI 9.2), and the
    # domain aggregates at pH 7.0. Every published Pei lysis assay runs at
    # 7.0-7.85. PMB pIs span 3-10, so the pI is computed per protein from its own
    # PMB span rather than borrowed.
    report_pi: true

  # ---- specificity-determining positions: which PMBR partition? ------------
  # `count`             one group per repeat count (pmbr0, pmbr1, ...)
  # `binding_competent` two groups, split at the 3-motif cliff
  #
  # Not both. They are nested: a column that separates 2-motif from 3-motif
  # proteins will separate `pmbr2` from `pmbr3` as well, and counting that as
  # replication across two partitions would double-count one piece of evidence.
  # `binding_competent` is the default because the cliff is the hypothesis and
  # the counts either side of it are noise.
  pmbr_partition_mode: binding_competent

  # ---- module trees --------------------------------------------------------
  module_tree_mode: fast           # 'fast' = LG+F+G4 --fast; 'full' = MFP+UFBoot
  module_max_tips: 3000
  mantel_permutations: 9999

  # ---- host cell-wall genotype --------------------------------------------
  # One .hmm per marker. GA lines are used when present, otherwise
  # `pmur_score_threshold`.
  #
  # WHICH GENES TO BUILD HMMs FOR. Lupo et al. 2025 (mSystems 10:e01201-24) found
  # 49 orthologous groups shared by all five sequenced PM genomes, but most are
  # useless as a screen:
  #   15 are widespread across Bacteria AND Archaea  -> screening on these lights
  #                                                     up half the tree
  #    9 are bacteria + PM-archaea
  #   25 are archaea-exclusive, of which only 15 are PM-exclusive.
  # The Mur domain alone is a TRAP: MurT, CapB, CphA and FPGS all carry it and are
  # everywhere. A bare "Mur ligase" hit is not PM evidence.
  #
  # Build HMMs for the PM-EXCLUSIVE block only (see scripts/pmur_reference.py):
  #   muramyl ligases  Muralpha=OG0001148, Murbeta=OG0001149,
  #                    Murgamma=OG0001150, Murdelta=OG0001473
  #   MraY-like GT     OG0001163
  #   CPS              OG0001014
  # Name each .hmm after its OG id or the Mur name so the block test can find it,
  # or map them explicitly under `pmur_block` below.
  #
  # CAVEAT, stated because it changes how to read the output: those HMMs come from
  # FIVE genomes, so they encode the diversity of exactly those five organisms.
  # They recover close relatives and miss anything divergent -- the very lineage a
  # discovery screen wants. An out-of-order NEGATIVE is therefore weak, not
  # absence. And genomic presence is never confirmation of PM: that is biochemical
  # (TalNAc + the beta-1,3 linkage).
  pmur_hmm_dir: /ebio/abt3_scratch/jmarsh/jan/hmms/pmur
  pmur_score_threshold: 30
  # Divergent-lineage mode. Out-of-order genomes are searched down to this lower
  # bar to catch homologs that score below GA; the extra hits are accepted ONLY
  # if they pass positional synteny (`synteny.permissive_out_of_order`). A
  # permissive hit on its own is noise, so it never elevates a call by itself --
  # the cluster arrangement is the false-positive control. In-order genomes are
  # unaffected (taxonomy calls them). One search, split in Python; no extra cost.
  pmur_score_threshold_permissive: 15

  # The PM call is TAXONOMY-first: a genome in Methanobacteriales or
  # Methanopyrales is called pseudomurein_expected_by_taxonomy regardless of
  # markers, because GTDB placement is more reliable than an n=5 OG screen. The
  # marker block is what flags PM OUTSIDE those two orders -- the discovery case.
  #
  # `pmur_min_markers` is now only a weak within-order corroboration count; the
  # real out-of-order gate is co-presence of the block (>=1 muramyl ligase + the
  # MraY-like + the CPS), which is far stricter than "any 3 of a bag".
  pmur_min_markers: 3

  # Optional: map your marker filenames to block roles, if you did not name them
  # after the OGs. Leave null to auto-detect by OG id / Mur name in the filename.
  pmur_block: null
  # pmur_block:
  #   muramyl_ligases: [Muralpha, Murbeta, Murgamma, Murdelta]
  #   mray_like: [OG0001163]
  #   cps: [OG0001014]
  #
  # Positional synteny (the actual cluster A/B arrangement, not just co-presence)
  # is the strongest out-of-order test. It is run ONLY for out-of-order
  # candidates -- genomes carrying the block but not in the two PM orders -- so it
  # costs almost nothing. Coordinates come from each genome's GFF (inputs.gff_col
  # for bacteria; Prodigal for archaea).
  synteny:
    enabled: true
    window_genes: 12          # block must fall within this many genes on one contig
    window_bp: 15000          # bp fallback when gene order is unavailable
    # Above this contig count, "block members on different contigs" is assembly
    # breakage, not biology -> not_evaluable rather than dispersed.
    max_contigs_for_synteny: 200
    # Feed permissive (below-GA) block hits to the synteny gate for out-of-order
    # genomes, so divergent homologs can be recovered -- but only when the cluster
    # arrangement holds. Defaults on when a permissive threshold is set below the
    # strict one.
    permissive_out_of_order: true

  # ---- structure -----------------------------------------------------------
  # Wang et al. 2025 (Int J Biol Macromol, S0141813025002211) deposited TWO
  # structures, and this matters:
  #
  #   8JX4   PeiW catalytic domain (PeiW-CD, residues 138-284), 2.3 A, with
  #          dipeptide co-crystals. Catalytic triad C198 / H233 / D250.
  #   8Z4F   full-length PeiP.     Catalytic triad C213 / H248 / D272.
  #
  # Y174, V252 and C265 -- the substrate-binding residues that confer
  # specificity -- are quoted in **PeiW** numbering. Pointing at 8Z4F while
  # using those numbers, as an earlier version of this config did, silently
  # selects the wrong residues. Use PeiW-CD, and `structure_expect` makes the
  # mistake impossible to repeat.
  structure: /ebio/abt3_scratch/jmarsh/jan/structures/8jx4.cif
  structure_chain: A
  structure_numbering: PeiW        # documentation; 'PeiP' if you swap to 8Z4F

  # Aromatic-guidance and specificity residues (PeiW). Y174/Y176/Y178/Y231
  # orient the substrate; V252 and C265 set the class (see below).
  groove_seed_residues: [174, 252, 265]

  # Hard identity check. groove_map.py exits non-zero if any of these auth
  # residues is not the residue named here. This is what catches a structure /
  # numbering mismatch before it corrupts the groove.
  structure_expect:
    174: Y     # oxyanion-hole tyrosine
    198: C     # catalytic Cys
    233: H     # catalytic His
    250: D     # catalytic Asp
    252: V     # class position 1
    265: C     # class position 2  (the paper's motif line writes C266; see below)

  # The conserved motif reported for the family, PeiW numbering:
  #   Y174 x x Y177 ... N197 C198 x D200 x x Q203 ... C225 ... H233 ... D250 ... C266
  # A literature-defined groove, used alongside the geometric 8 A shell.
  groove_literature_residues: [174, 176, 177, 178, 197, 198, 200, 203,
                               225, 231, 233, 250, 252, 265, 266]

  groove_radius_a: 8.0
  contact_radius_a: 8.0            # for coupling-pair contact validation
  structure_offset: 0

  # ---- the divalent metal nobody has located -------------------------------
  # Subedi et al. 2015 (Archaea 2015:828693): 0.5 mM EDTA leaves PeiW and PeiP
  # with <1% activity, and a divalent cation restores it completely. The two
  # enzymes then part company:
  #
  #   PeiW   rescued by Ca > Mn > Mg > Ba > Ni      (promiscuous)
  #   PeiP   rescued by Ca only; the rest give <15% (strict)
  #
  # Ca also confers thermostability: PeiW keeps all of its activity after 60 min
  # at 80 C with Ca and loses half in 5 min without it.
  #
  # This is the sharpest measured biochemical difference between the two
  # characterised enzymes, and nothing in the substrate groove or in Wang et al.'s
  # four-class partition predicts it. If a cation is present in the coordinates,
  # groove_map.py builds a coordination shell around it and sdp.py tests that
  # shell for specificity-determining positions independently of the groove. If
  # no cation is modelled -- and neither 8JX4 nor 8Z4F is reported with one --
  # the pipeline says so and moves on. It does not invent a site.
  metal_site:
    enabled: true
    ions: [CA, MG, MN, ZN, NI, BA, CO, FE]
    coordination_radius_a: 3.2     # first shell, ion to protein heavy atom
    shell_radius_a: 8.0            # second shell, for SDP enrichment
    # Residues that can coordinate a hard divalent cation. Used to report how
    # plausible a detected site is. Never used to place one.
    coordinating_residues: [D, E, N, Q, S, T, H]

  # ---- sentinels: proteins whose answer is already known --------------------
  # PeiR is encoded by prophage Phi-mru of Methanobrevibacter ruminantium M1.
  # M1 is the Thr-at-P1 organism (Kandler & Koenig 1978, that exact strain), it
  # resists both PeiW and PeiP (Subedi et al. 2015), and PeiR lyses it while
  # showing "little homology" to either.
  #
  # That is the prespecified hypothesis of this screen, and it was stated before
  # any clustering was run: PEI SEQUENCE TRACKS HOST WALL CHEMISTRY. If it holds,
  # PeiR should fall outside the PeiW/PeiP SSN cluster and should not be class I.
  # The report checks both, and records whether PeiR was recovered by PF12386 at
  # all or only by SSF54001 -- because if the curated gathering threshold misses
  # the one enzyme known to cut a divergent wall, the screen is blind in exactly
  # the direction it cares about.
  sentinels:
    - name: PeiR
      host_species: s__Methanobrevibacter ruminantium
      host_strain: M1
      prophage: Phi-mru
      expect_divergent_from: [PeiW, PeiP]
      hypothesis: >-
        a divergent wall (Thr at P1) is cut by a divergent enzyme: PeiR should
        not cluster with PeiW/PeiP and should not be class I
    - name: PeiW
      host_species: s__Methanothermobacter wolfeii
      prophage: PsiM100
      expect_class: I
    - name: PeiP
      host_species: s__Methanothermobacter marburgensis
      prophage: PsiM1/PsiM2
      expect_class: I
    # PF09373 without PF12386. A three-motif PMB domain on an S-layer protein,
    # no catalytic domain, and it binds pseudomurein. If the screen calls this a
    # Pei, the architecture step is not doing its job.
    - name: MTH719
      uniprot: O26815
      host_species: s__Methanothermobacter thermautotrophicus
      role: putative S-layer protein
      expect_pmbr: 3
      expect_catalytic: 0

  # Bacteria known (as of Visweswaran et al. 2011) to carry PMB motifs, each of
  # which also carries LysM. The bacterial arm of this screen should recover
  # them. If it recovers PMBR in bacteria and NOT in these three, the Pfam
  # threshold or the proteome set is wrong before any biology is discussed.
  #
  # Their existence is also why a bacterial C71+PMBR protein is not written off:
  # the PMB domain binds NAG and sticks to lysozyme-treated bacterial
  # spheroplasts, so exposed murein is a live hypothesis.
  pmbr_bacteria_expected:
    - s__Xanthomonas campestris
    - s__Granulibacter bethesdensis
    - s__Novosphingobium aromaticivorans

  # ---- the published four-class partition ---------------------------------
  # Wang et al. divide peptidase C71 into four classes on the identity of the
  # two non-conserved residues that sit 3-4 A from the His-Asp centre. Every
  # non-class-I combination they built into PeiW-CD lost activity; V+V retained
  # about half.
  #
  #   class I    V252 + C265     (PeiW, PeiP)
  #   class II   V252 + V265
  #   class III  T/S252 + I265
  #   class IV   A252 + M/W265
  #
  # This is an external, structure-grounded partition of the family that owes
  # nothing to our k-means, and it predicts k = 4.
  #
  # CAUTION: V252 is two residues from the catalytic D250, so it falls INSIDE
  # the +/-5 triad-flank barcode. pei_class is therefore *partly* determined by
  # a barcode column, and sdp.py excludes both class positions from the SDP test
  # whenever the pei_class partition is in use.
  pei_class:
    enabled: true
    position_1: 252                # V in class I/II, T/S in III, A in IV
    position_2: 265                # C in I, V in II, I in III, M/W in IV
    position_2_alt: 266            # the motif line in the paper writes C266
    classes:
      I:   {p1: [V], p2: [C]}
      II:  {p1: [V], p2: [V]}
      III: {p1: [T, S], p2: [I]}
      IV:  {p1: [A], p2: [M, W]}

  # ---- specificity-determining positions ----------------------------------
  # The active-site subgroups are k-means on the triad-flank barcode. Testing
  # SDPs on those same columns is circular. SDPs are therefore called under
  # partitions that did not see the barcode, and only kept if they replicate.
  sdp_partitions: [tree_clade, ssn_cluster, pmbr_architecture, host_genus, pei_class]
  sdp_min_partitions: 2            # replicate in >= this many to be called
  sdp_min_group_size: 10
  sdp_max_groups: 12
  sdp_permutations: 1000
  sdp_fdr: 0.05
  # Permutations shuffle group labels WITHIN tree clades, so the null preserves
  # phylogenetic structure instead of destroying it (which would make every
  # phylogenetically clustered position look like an SDP).
  sdp_null: within_clade
  # Clades are cut by SUBTREE SIZE, not by a fixed depth. Cutting at a depth on
  # an unbalanced tree yields singleton clades, and a within-clade shuffle over
  # singletons is the identity permutation: the null becomes the observation and
  # nothing can ever be called significant. It fails silently and looks exactly
  # like "no signal". null_is_degenerate() detects the residual case and falls
  # back to a global null, loudly.
  sdp_clade_target_size: null      # null -> max(5, n_tips // 40)

  # ---- selection -----------------------------------------------------------
  selection:
    enabled: true
    # Prokka writes .ffn beside .faa; Prodigal writes it in prodigal_dir.
    bacteria_ffn_from_faa: true    # s/\.faa$/.ffn/
    max_seqs: 500                  # HyPhy is O(n) per site but not free
    hyphy_methods: [FEL, MEME]
    run_relax: false           # RELAX is NOT implemented; see scripts/selection.py. A true value is a hard error.
    codon_alignment: pal2nal

  # ---- prophage context ----------------------------------------------------
  genomad_db: /ebio/abt3_projects/databases/genomad/genomad_db
  genomad_enabled: true

  # ---- structure-based confirmation for divergent lineages ----------------
  # Fold outlives sequence. For the out-of-order PM candidates -- especially the
  # divergent ones the permissive+synteny mode recovered -- this asks whether the
  # candidate protein adopts the fold of the PM-exclusive reference (MraY-like,
  # CPS, muramyl ligase), which no sequence method can reach.
  #
  # OFF by default, and every stage is gated on the tool + its staged resources.
  # The cluster is offline, so ESMFold weights, a Foldseek PM database and an
  # HH-suite PM database must be staged by hand; a missing one skips that stage
  # with a recorded reason, never a fabricated hit. NOT executed in development
  # (no GPU / tools / DBs); the parsers are unit-tested, the run is not.
  structure_search:
    enabled: false
    esmfold_weights: /ebio/abt3_projects/software/esmfold           # ESMFold model dir
    foldseek_pm_db:  /ebio/abt3_projects/databases/foldseek/pm_refs # foldseek DB prefix
    hhsuite_pm_db:   /ebio/abt3_projects/databases/hhsuite/pm_refs   # HH-suite DB prefix
    # Which pathway_call values are worth folding. Default: the syntenic ones.
    candidate_calls:
      - pseudomurein_candidate_out_of_order_syntenic
      - pseudomurein_candidate_out_of_order_divergent_syntenic

  # ---- experimental panel --------------------------------------------------
  panel_size: 8                    # representatives to nominate for assay

# ---- Plotting --------------------------------------------------------------
plots:
  formats: [png, svg]
  dpi: 600
  taxonomy_col: null
  taxonomy_rank: phylum
  max_taxa_in_legend: 12
