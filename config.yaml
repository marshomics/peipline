# ============================================================================
# C71 (pseudomurein endo-isopeptidase Pei) screening pipeline - configuration
# ============================================================================

# ---- Software --------------------------------------------------------------
# null  -> Snakemake solves envs/*.yaml itself. Needs internet on the node that
#          runs each job. Use this on a laptop only.
# path  -> pre-built environments already exist under this directory, one per
#          env name (hmmer, py, phylo, network, prodigal, r). Nothing is
#          downloaded and no channel is contacted. Required on an offline
#          cluster. Build them with setup/build_envs.sh on a machine with
#          internet, then setup/install_envs.sh here.
#
# It must be on a filesystem the compute nodes can read.
envs_root: null
# envs_root: /ebio/abt3_projects/software/c71_envs

# ---- Inputs ----------------------------------------------------------------
inputs:
  # Pre-existing proteomes (bacteria).
  sample_table: /ebio/abt3_scratch/jmarsh/jan/faa_sample_table_90percent.tsv
  sample_col: sample
  faa_col: faa

  # Genome-quality metadata for the above. Column names are auto-detected from
  # the candidate lists under `qc:` below.
  #
  # NOTE: this table also carries `gtdb_domain`. 3,215 of the 342,759 "bacterial"
  # proteomes are in fact d__Archaea, and Methanobacteriota is where Pei lives.
  # Domain is read from that column, never from which file a genome arrived in.
  bacteria_metadata: /ebio/abt3_projects2/Gut_genetics2/data/total_metadata_qc_bbmap_animals_extra.txt
  bacteria_metadata_key: genome    # null -> auto-detect the column holding sample IDs

  # Archaeal assemblies to call genes on with Prodigal.
  archaea_fna_glob: /ebio/abt3_scratch/jmarsh/archaea_plasmids/db/final_db/gtdb_archaea/seqs/*.fna
  archaea_metadata: /ebio/abt3_scratch/jmarsh/archaea_plasmids/db/final_db/gtdb_archaea/ar53_metadata_r232.tsv
  archaea_metadata_key: accession

# GTDB reference trees for the phylogenetic regressions.
trees:
  bacteria: /ebio/abt3_scratch/jmarsh/tract_score3/gtdb_custom_trees/human_animal_free_90percent/output/gtdbtk.rooted.speciesnames.tree
  archaea:  /ebio/abt3_projects2/Gut_genetics/data/gtdb_tree/trees/ar53.tree

# How genomes map to tree tip labels.
#
#   identity          the sample ID is the tip label
#   gtdb_accession    tries GB_/RS_/bare variants of the sample ID
#   gtdb_species      the genome's gtdb_species is the tip label
#   gtdb_species_rep  accession first, then the genome's species representative
#
# BOTH supplied trees are species-level, so both use a species mode:
#   gtdbtk.rooted.speciesnames.tree has 9,784 tips labelled `s__Genus species`.
#     Matching genome IDs against them matches zero of 342,759.
#   ar53.tree carries species representatives only, so a non-representative
#     genome inherits its representative's tip via `gtdb_representative`.
#
# Many genomes therefore share a tip. phyloglm.R aggregates to the tip.
tip_matching:
  bacteria: gtdb_species
  archaea: gtdb_species_rep
  min_match_fraction: 0.50         # abort below this; a bad key is not a result

# Which metadata columns carry genome quality. First match wins.
#
# `ctg_L50` in total_metadata_qc_bbmap_animals_extra.txt is misnamed: its median
# is 39,413 against a 2.1 Mb median genome and 89 contigs, so it is an N50
# *length*, not an L50 *count*. It is used as N50 deliberately, not by accident.
qc:
  completeness:  [checkm2_completeness, checkm_completeness, completeness, Completeness, comp]
  contamination: [checkm2_contamination, checkm_contamination, contamination, Contamination, contam]
  n50:           [n50_contigs, contig_n50, scaffold_n50, ctg_L50, N50, n50]
  contigs:       [contig_count, n_contigs, num_contigs, contigs, scaffold_count]

# ---- Prodigal --------------------------------------------------------------
prodigal:
  mode: single                     # 'single' per-genome model; falls back to 'meta'
                                   # automatically on short/fragmented assemblies
  translation_table: 11
  min_len_for_single: 20000        # prodigal's own floor for training
  batch_size: 100                  # genomes per job (~10 s each -> ~15 min/job)

# ---- Profiles --------------------------------------------------------------
# PF12386 is the specific model: the C-terminal catalytic cysteine-protease
# domain of pseudomurein endo-isopeptidase Pei. It has a curated Pfam gathering
# threshold, so use it.
#
# SSF54001 is the SCOP 'cysteine proteinases' superfamily. It is a sensitivity
# net, not evidence of C71 identity: at score 25 it hits every papain-like and
# transglutaminase-like protein in the database. The two are kept as separate
# evidence tiers throughout.
profiles:
  PF12386:
    path: /ebio/abt3_scratch/jmarsh/jan/hmms/PF12386.hmm
    threshold: cut_ga              # 'cut_ga' | 'cut_nc' | 'cut_tc' | a number
    role: specific
  SSF54001:
    path: /ebio/abt3_scratch/jmarsh/jan/hmms/SSF54001.hmm
    threshold: 25
    role: sensitivity

align_profile: PF12386             # alignment scaffold; must be the specific model
specific_profile: PF12386          # triad columns are learned from these hits only

# Reject fragmentary hits: best domain must cover this fraction of the profile.
min_profile_coverage: 0.0          # 0 = off. 0.5 is a defensible starting point.

# Empirical false-discovery estimate: search reversed decoy sequences and report
# a score-vs-FDR curve. Costs one extra pass over the data.
decoy_fdr: true

# ---- Outputs ---------------------------------------------------------------
outputs:
  hmm_output_dir: /ebio/abt3_scratch/jmarsh/jan/hmm_output
  combined_table: /ebio/abt3_scratch/jmarsh/jan/hmm_output_combine.txt
  merged_table:   /ebio/abt3_scratch/jmarsh/jan/faa_sample_table_90percent_taxonomy.tsv
  outdir:         /ebio/abt3_scratch/jmarsh/jan/outputs
  workdir:        /ebio/abt3_scratch/jmarsh/jan/work
  prodigal_dir:   /ebio/abt3_scratch/jmarsh/jan/prodigal

# Genomes per search_batch job. 342,759 bacteria + ~22k archaea at 1,000 each
# is ~365 jobs, each reading ~1 GB of proteomes and running 4 hmmsearch passes
# (2 profiles x target+decoy) against node-local scratch.
#
# Raise it to cut job count and shared-filesystem metadata pressure; lower it if
# $TMPDIR on the exec hosts is small (the batch FASTA plus its decoy is ~2x the
# proteome bytes in the batch). 1,000 x ~1 MB x 2 = ~2 GB of scratch per job.
batch_size: 1000
hmmsearch_cpu: 8                   # slots per search_batch job; 865 free on standard.q
allow_missing_faa: true

# ---- Alignment -------------------------------------------------------------
hmmalign_trim: true

# ---- Sequence redundancy weighting ----------------------------------------
# Every sequence-level frequency in this pipeline (triad column conservation,
# logos, entropy, consensus, mutual information, subgroup sizes) is weighted by
# 1 / (size of the sequence's identity cluster). Without this, a genus with
# 8,000 sequenced isolates dictates what the family's active site "looks like".
redundancy:
  cluster_min_seq_id: 0.90
  cluster_coverage: 0.80
  enabled: true

# ---- Catalytic triad -------------------------------------------------------
# PeiP's structure (PDB 8Z4F) shows a transglutaminase-like Cys-His-Asp triad,
# so CHD is the hypothesis, not CHN. The detector still scores alternatives and
# writes them to triad_candidates.tsv, because a heuristic that cannot be
# audited is not a result.
triad:
  first_residue: C
  second_residue: H
  third_residue: D
  alt_third_residue: N             # scored for comparison only; null to skip

  expected_gap_1_2: 35             # soft prior from your C213/H248/D272
  expected_gap_2_3: 24
  spacing_tolerance: 25
  spacing_weight: 0.35

  min_occupancy: 0.50
  min_residue_freq: 0.40
  max_candidates_per_residue: 40

  # Columns are learned from `specific_profile` hits only, then applied
  # unchanged to the SSF54001-only sequences in the same alignment.
  restrict_to_specific: true

  override_columns: null           # e.g. [112, 147, 171] after you audit

# ---- Phylogeny -------------------------------------------------------------
tree:
  dereplicate: true
  max_seqs: 5000
  cluster_min_seq_id: 0.90
  cluster_coverage: 0.80
  trimal_mode: "-gappyout"
  mode: full                       # 'full' = MFP + UFBoot + SH-aLRT; 'fast'
  iqtree_threads: 16
  seed: 12345

# ---- Active-site subgroups -------------------------------------------------
active_site:
  flank_window: 5
  max_cluster_seqs: 20000
  entropy_weighting: true
  pca_selection: parallel_analysis  # parallel_analysis | variance | fixed
  pca_variance: 0.90
  pca_components: 50
  k_criterion: silhouette_cosine    # see README for why not Euclidean
  k_min: 2
  k_max: 15
  run_hdbscan: true
  hdbscan_min_cluster_size: 25
  random_state: 12345

# ---- Coupling between barcode positions ------------------------------------
coupling:
  n_permutations: 1000
  fdr: 0.05
  min_column_occupancy: 0.5

# ---- Sequence similarity network -------------------------------------------
# EFI-EST convention: edge weight = -log10(E-value) from an all-vs-all search.
ssn:
  evalue_max: 1e-3
  diamond_sensitivity: "--very-sensitive"
  threshold_min: 10
  threshold_max: 200
  threshold_step: 5
  threshold: null                  # null -> pick the knee of components-vs-threshold
  max_nodes: 20000                 # cluster reps above this
  layout: drl                      # python-igraph layout
  threads: 32

# ---- Convergence -----------------------------------------------------------
convergence:
  n_permutations: 1000             # tip-label shuffles for the origins null
  n_brownian: 500                  # simulations for the Fritz & Purvis D statistic
  seed: 12345

# ---- Phylogenetic logistic regression --------------------------------------
phyloglm:
  # phylolm builds the full n x n phylogenetic covariance, so tips must be
  # capped. Above `max_tips` the pipeline draws `n_replicates` outcome-stratified
  # subsamples, fits each, and pools with Rubin's rules.
  max_tips: 8000
  n_replicates: 20
  btol: 20
  covariates: [completeness, contamination, log10_n50, log10_contigs, log10_n_proteins]
  # Reference values for the bias-adjusted prevalence prediction.
  reference: {completeness: 100.0, contamination: 0.0}
  run_subgroup_models: true
  min_positives: 25                # skip a model with fewer positives than this
  seed: 12345

# ---- Plotting --------------------------------------------------------------
plots:
  formats: [png, svg]
  dpi: 600
  taxonomy_col: null
  taxonomy_rank: phylum
  max_taxa_in_legend: 12
